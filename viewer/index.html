<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrain Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@4.4.0/dist/maplibre-gl.js"></script>
  <link   href="https://unpkg.com/maplibre-gl@4.4.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<div id="map"></div>

<div id="search-wrap">
  <input id="search-input" type="text" placeholder="Search places…" autocomplete="off" spellcheck="false">
  <button id="search-clear" title="Clear">✕</button>
  <div id="search-results">
    <div id="search-status"></div>
  </div>
</div>

<div id="controls">
  <h2>Terrain viewer</h2>

  <!-- sun compass dial -->
  <div id="compass-wrap">
    <canvas id="sun-canvas" width="90" height="90"></canvas>
  </div>

  <div class="row">
    <label>Sun direction</label>
    <span class="val" id="az-val">315°</span>
  </div>
  <input type="range" id="azimuth" min="0" max="359" value="315">

  <div class="row">
    <label>Sun altitude</label>
    <span class="val" id="alt-val">35°</span>
  </div>
  <input type="range" id="altitude" min="5" max="85" value="35">

  <div class="row">
    <label>Shading strength</label>
    <span class="val" id="ex-val">0.6</span>
  </div>
  <input type="range" id="exaggeration" min="0" max="10" step="1" value="6">

  <hr class="sep">

  <div class="row"><label>Background</label></div>
  <select id="bg-select">
    <option value="osm">OpenStreetMap</option>
    <option value="satellite">Satellite (Esri)</option>
    <option value="none">None</option>
  </select>

  <div class="toggle-row">
    <label for="toggle-3d">3D terrain</label>
    <input type="checkbox" id="toggle-3d">
  </div>

  <div class="toggle-row">
    <label for="toggle-osm">OSM vectors</label>
    <input type="checkbox" id="toggle-osm" checked>
  </div>

  <div class="toggle-row">
    <label for="toggle-slope">Slope colors</label>
    <input type="checkbox" id="toggle-slope">
  </div>

  <div class="toggle-row" id="vert-row" style="opacity:.4;pointer-events:none">
    <label>Vertical scale</label>
    <span class="val" id="vert-val">1.5×</span>
  </div>
  <input type="range" id="vert-ex" min="5" max="40" step="1" value="15"
         style="opacity:.4;pointer-events:none">
</div>

<div id="status">Move mouse over the map</div>

<script>
// ---------------------------------------------------------------------------
// Map init
// ---------------------------------------------------------------------------
// Register PMTiles protocol so MapLibre can read .pmtiles files directly
const pmtilesProtocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile.bind(pmtilesProtocol));

// ---------------------------------------------------------------------------
// Slope overlay protocol — computes slope from terrain-RGB tiles in the browser
// Returns a blue (flat) → red (steep, ≥50°) colored PNG tile
// ---------------------------------------------------------------------------
maplibregl.addProtocol('slope', async (params) => {
  try {
    const [z, x, y] = params.url.replace('slope://', '').split('/').map(Number);
    const resp = await fetch(`http://localhost:8080/tiles/${z}/${x}/${y}.png`);
    if (!resp.ok) throw new Error('not found');
    const srcBitmap = await createImageBitmap(await resp.blob());

    const S = 256;
    const srcCtx = new OffscreenCanvas(S, S).getContext('2d');
    srcCtx.drawImage(srcBitmap, 0, 0);
    const { data: src } = srcCtx.getImageData(0, 0, S, S);

    // Metres per pixel at tile-centre latitude (Web Mercator)
    const n = Math.pow(2, z);
    const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * (y + 0.5) / n)));
    const mpp = 2 * Math.PI * 6378137 * Math.cos(latRad) / (S * n);

    function ele(r, c) {
      r = Math.max(0, Math.min(S - 1, r));
      c = Math.max(0, Math.min(S - 1, c));
      const i = (r * S + c) * 4;
      return -10000 + (src[i] * 65536 + src[i + 1] * 256 + src[i + 2]) * 0.1;
    }

    const out = new ImageData(S, S);
    const dst = out.data;
    for (let r = 0; r < S; r++) {
      for (let c = 0; c < S; c++) {
        const spanC = (c === 0 || c === S - 1) ? 1 : 2;
        const spanR = (r === 0 || r === S - 1) ? 1 : 2;
        const dx = (ele(r, c + 1) - ele(r, c - 1)) / (spanC * mpp);
        const dy = (ele(r + 1, c) - ele(r - 1, c)) / (spanR * mpp);
        const deg = Math.atan(Math.sqrt(dx * dx + dy * dy)) * 180 / Math.PI;
        // 0°=blue · 12.5°=cyan · 25°=green · 37.5°=yellow · ≥50°=red
        const t = Math.min(deg / 50, 1);
        let R, G, B;
        if      (t < 0.25) { R = 0;   G = Math.round(t * 4 * 255);               B = 255; }
        else if (t < 0.5)  { R = 0;   G = 255;                                    B = Math.round((1 - (t - 0.25) * 4) * 255); }
        else if (t < 0.75) { R = Math.round((t - 0.5) * 4 * 255);  G = 255;      B = 0; }
        else               { R = 255; G = Math.round((1 - (t - 0.75) * 4) * 255); B = 0; }
        const i = (r * S + c) * 4;
        dst[i] = R; dst[i + 1] = G; dst[i + 2] = B; dst[i + 3] = 255;
      }
    }

    const dstCanvas = new OffscreenCanvas(S, S);
    dstCanvas.getContext('2d').putImageData(out, 0, 0);
    const blob = await dstCanvas.convertToBlob({ type: 'image/png' });
    return { data: await blob.arrayBuffer() };
  } catch (_) {
    return { data: new ArrayBuffer(0) };
  }
});

const CENTER_LNG = 15.625;   // Lövberget / Falun area
const CENTER_LAT = 60.608;
const START_ZOOM = 13;

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'http://localhost:8080/fonts/{fontstack}/{range}.pbf',
    sources: {
      osm: {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        maxzoom: 19,
      },
      satellite: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        attribution: '© Esri, Maxar, Earthstar Geographics',
        maxzoom: 19,
      },
      terrain: {
        type: 'raster-dem',
        tiles: ['http://localhost:8080/tiles/{z}/{x}/{y}.png'],
        tileSize: 256,
        encoding: 'mapbox',
        minzoom: 8,
        maxzoom: 15,
        attribution: '© Lantmäteriet LiDAR',
      },
      coverage: {
        type: 'geojson',
        data: 'http://localhost:8080/tiles/coverage.geojson',
      },
      'slope-tiles': {
        type: 'raster',
        tiles: ['slope://{z}/{x}/{y}'],
        tileSize: 256,
        minzoom: 8,
        maxzoom: 15,
      },
      osmvec: {
        type: 'vector',
        url: 'pmtiles://http://localhost:8080/tiles/dalarna.pmtiles',
        attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
      },
    },
    layers: [
      { id: 'bg-solid', type: 'background', paint: { 'background-color': '#2a2e35' } },
      { id: 'bg-osm',       type: 'raster', source: 'osm',       paint: { 'raster-opacity': 1.0 } },
      { id: 'bg-satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1.0 },
        layout: { visibility: 'none' } },
      { id: 'slope-overlay', type: 'raster', source: 'slope-tiles',
        layout: { visibility: 'none' },
        paint: { 'raster-opacity': 0.65, 'raster-fade-duration': 0 },
      },
      { id: 'hillshade', type: 'hillshade', source: 'terrain', paint: {
          'hillshade-illumination-anchor': 'map',
          'hillshade-illumination-direction': 315,
          'hillshade-exaggeration': 0.6,
          'hillshade-shadow-color': '#2a2a3a',
          'hillshade-highlight-color': '#fffbe8',
        }
      },
      // --- OSM vector overlay ---
      // Landuse fill (forest, farmland …)
      { id: 'osm-landuse', type: 'fill', source: 'osmvec', 'source-layer': 'landuse', minzoom: 9,
        paint: { 'fill-color': ['match', ['get', 'landuse'],
            'forest', '#2d4a2d', 'wood', '#2d4a2d',
            'farmland', '#6b7a3a', 'meadow', '#4a6b3a',
            'wetland', '#3a5a6b', 'heath', '#5a4a3a',
            '#333'
          ], 'fill-opacity': 0.35 },
      },
      // Water polygons
      { id: 'osm-water', type: 'fill', source: 'osmvec', 'source-layer': 'water', minzoom: 6,
        paint: { 'fill-color': '#2a5f7a', 'fill-opacity': 0.7 },
      },
      // Buildings
      { id: 'osm-buildings', type: 'fill', source: 'osmvec', 'source-layer': 'buildings', minzoom: 14,
        paint: { 'fill-color': '#555', 'fill-opacity': 0.6 },
      },
      // Motor roads — casing
      { id: 'osm-road-casing', type: 'line', source: 'osmvec', 'source-layer': 'roads', minzoom: 9,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#222', 'line-width': ['interpolate', ['linear'], ['zoom'],
          10, 2, 14, 5, 16, 8], 'line-opacity': 0.7 },
      },
      // Motor roads — fill
      { id: 'osm-road-fill', type: 'line', source: 'osmvec', 'source-layer': 'roads', minzoom: 9,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#fff', 'line-width': ['interpolate', ['linear'], ['zoom'],
          10, 1, 14, 3, 16, 5], 'line-opacity': 0.85 },
      },
      // Tracks
      { id: 'osm-track', type: 'line', source: 'osmvec', 'source-layer': 'tracks', minzoom: 11,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#d4a853', 'line-width': ['interpolate', ['linear'], ['zoom'],
          11, 0.5, 14, 2, 16, 3], 'line-opacity': 0.9 },
      },
      // Paths, footways, cycleways — coloured by mtb:scale where available
      { id: 'osm-path', type: 'line', source: 'osmvec', 'source-layer': 'paths', minzoom: 12,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-width': ['interpolate', ['linear'], ['zoom'], 12, 0.5, 14, 2, 16, 3],
          'line-opacity': 0.95,
          'line-color': ['match', ['get', 'mtb_scale'],
            '0',  '#4caf50',
            '1',  '#2196f3',
            '1+', '#1565c0',
            '2',  '#e53935',
            '3',  '#880e4f',
            '#aaaaaa',
          ],
        },
      },
      // Waterways
      { id: 'osm-waterway', type: 'line', source: 'osmvec', 'source-layer': 'waterways', minzoom: 11,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': '#5ab4d4', 'line-width': ['interpolate', ['linear'], ['zoom'],
          11, 0.5, 14, 1.5, 16, 2.5], 'line-opacity': 0.85 },
      },
      // Railways
      { id: 'osm-railway', type: 'line', source: 'osmvec', 'source-layer': 'railways', minzoom: 8,
        layout: { 'line-join': 'round', 'line-cap': 'butt' },
        paint: { 'line-color': '#888', 'line-width': ['interpolate', ['linear'], ['zoom'],
          8, 1, 14, 3], 'line-dasharray': [3, 2] },
      },
      // Power lines
      { id: 'osm-power', type: 'line', source: 'osmvec', 'source-layer': 'powerlines', minzoom: 11,
        paint: { 'line-color': '#cc0', 'line-width': 1, 'line-opacity': 0.5 },
      },
      // Natural lines (cliffs etc.)
      { id: 'osm-natural-lines', type: 'line', source: 'osmvec', 'source-layer': 'natural_lines', minzoom: 12,
        paint: { 'line-color': '#a0522d', 'line-width': 1.5, 'line-opacity': 0.8 },
      },
      // Peak layers added dynamically in map.on('load') below
      // (triangle uses a canvas image — Open Sans Bold lacks the ▲ glyph)
      // Place labels
      { id: 'osm-places', type: 'symbol', source: 'osmvec', 'source-layer': 'places', minzoom: 7,
        layout: {
          'text-field': ['get', 'name'],
          'text-font': ['Open Sans Regular'],
          'text-size': ['match', ['get', 'place'],
            'city', 16, 'town', 13, 'village', 11, 10],
          'text-anchor': 'center',
        },
        paint: { 'text-color': '#fff', 'text-halo-color': '#222', 'text-halo-width': 1.5,
                 'text-opacity': ['interpolate', ['linear'], ['zoom'], 7, 0.7, 12, 1.0] },
      },
      // grey-out everything outside the tile coverage
      { id: 'coverage-mask', type: 'fill', source: 'coverage',
        filter: ['==', ['get', 'type'], 'mask'],
        paint: { 'fill-color': '#888888', 'fill-opacity': 0.35 },
      },
      // dashed orange border around the coverage extent
      { id: 'coverage-border', type: 'line', source: 'coverage',
        filter: ['==', ['get', 'type'], 'border'],
        paint: { 'line-color': '#ff7733', 'line-width': 2, 'line-dasharray': [4, 3] },
      },
    ],
  },
  center: [CENTER_LNG, CENTER_LAT],
  zoom: START_ZOOM,
  maxPitch: 85,
});

// ---------------------------------------------------------------------------
// Settings persistence
// ---------------------------------------------------------------------------
const DEFAULTS = {
  azimuth: 315, altitude: 35, exaggeration: 6,
  terrain3d: false, vertEx: 15,
  background: 'osm', osmVectors: true,
  slope: false,
};

function saveSetting(key, value) {
  try { localStorage.setItem('tv_' + key, JSON.stringify(value)); } catch(e) {}
}
function loadSetting(key) {
  try {
    const v = localStorage.getItem('tv_' + key);
    return v !== null ? JSON.parse(v) : DEFAULTS[key];
  } catch(e) { return DEFAULTS[key]; }
}

// ---------------------------------------------------------------------------
// Controls → map
// ---------------------------------------------------------------------------
const azSlider   = document.getElementById('azimuth');
const altSlider  = document.getElementById('altitude');
const exSlider   = document.getElementById('exaggeration');
const vertSlider = document.getElementById('vert-ex');
const toggle3d   = document.getElementById('toggle-3d');
const bgSelect   = document.getElementById('bg-select');
const toggleOsm   = document.getElementById('toggle-osm');
const toggleSlope = document.getElementById('toggle-slope');
const azVal      = document.getElementById('az-val');
const altVal     = document.getElementById('alt-val');
const exVal      = document.getElementById('ex-val');
const vertVal    = document.getElementById('vert-val');

// Restore UI from storage
azSlider.value   = loadSetting('azimuth');
altSlider.value  = loadSetting('altitude');
exSlider.value   = loadSetting('exaggeration');
vertSlider.value = loadSetting('vertEx');
toggle3d.checked    = loadSetting('terrain3d');
bgSelect.value      = loadSetting('background');
toggleOsm.checked   = loadSetting('osmVectors');
toggleSlope.checked = loadSetting('slope');

// Sync display labels to restored values
azVal.textContent  = azSlider.value + '°';
altVal.textContent = altSlider.value + '°';
exVal.textContent  = (parseInt(exSlider.value) / 10).toFixed(1);
vertVal.textContent = (parseInt(vertSlider.value) / 10).toFixed(1) + '×';

// Restore vert-scale row opacity
{
  const on = toggle3d.checked;
  const vertRow = document.getElementById('vert-row');
  vertRow.style.opacity       = on ? '1' : '.4';
  vertRow.style.pointerEvents = on ? '' : 'none';
  vertSlider.style.opacity       = on ? '1' : '.4';
  vertSlider.style.pointerEvents = on ? '' : 'none';
}

function applyAltitude() {
  const t = parseInt(altSlider.value) / 85;
  map.setPaintProperty('hillshade', 'hillshade-shadow-color',
    `hsl(240, 15%, ${Math.round(20 + t * 30)}%)`);
  map.setPaintProperty('hillshade', 'hillshade-highlight-color',
    `hsl(45, 30%, ${Math.round(95 + t * 4)}%)`);
}

function updateHillshade() {
  const az = parseInt(azSlider.value);
  const ex = parseInt(exSlider.value) / 10;
  azVal.textContent = az + '°';
  exVal.textContent = ex.toFixed(1);
  map.setPaintProperty('hillshade', 'hillshade-illumination-direction', az);
  map.setPaintProperty('hillshade', 'hillshade-exaggeration', ex);
  drawCompass(az);
}

altSlider.addEventListener('input', () => {
  altVal.textContent = altSlider.value + '°';
  applyAltitude();
  saveSetting('altitude', altSlider.value);
});

azSlider.addEventListener('input', () => { updateHillshade(); saveSetting('azimuth', azSlider.value); });
exSlider.addEventListener('input', () => { updateHillshade(); saveSetting('exaggeration', exSlider.value); });

toggle3d.addEventListener('change', () => {
  const on = toggle3d.checked;
  const vertRow = document.getElementById('vert-row');
  vertRow.style.opacity       = on ? '1' : '.4';
  vertRow.style.pointerEvents = on ? '' : 'none';
  vertSlider.style.opacity       = on ? '1' : '.4';
  vertSlider.style.pointerEvents = on ? '' : 'none';
  if (on) {
    map.setTerrain({ source: 'terrain', exaggeration: parseInt(vertSlider.value) / 10 });
    map.easeTo({ pitch: 50, duration: 600 });
  } else {
    map.setTerrain(null);
    map.easeTo({ pitch: 0, duration: 600 });
  }
  saveSetting('terrain3d', on);
});

vertSlider.addEventListener('input', () => {
  const v = parseInt(vertSlider.value) / 10;
  vertVal.textContent = v.toFixed(1) + '×';
  if (toggle3d.checked) map.setTerrain({ source: 'terrain', exaggeration: v });
  saveSetting('vertEx', vertSlider.value);
});

// ---------------------------------------------------------------------------
// Sun compass dial
// ---------------------------------------------------------------------------
const canvas = document.getElementById('sun-canvas');
const ctx    = canvas.getContext('2d');
let dragging = false;

function drawCompass(azDeg) {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2, r = w / 2 - 4;

  ctx.clearRect(0, 0, w, h);

  // Tick marks
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  for (let i = 0; i < 360; i += 45) {
    const a = (i - 90) * Math.PI / 180;
    const inner = i % 90 === 0 ? r - 10 : r - 6;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    ctx.lineTo(cx + Math.cos(a) * r,     cy + Math.sin(a) * r);
    ctx.stroke();
  }

  // Cardinal labels
  const labels = { 0: 'N', 90: 'E', 180: 'S', 270: 'W' };
  ctx.fillStyle = '#666';
  ctx.font = '8px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const [deg, lbl] of Object.entries(labels)) {
    const a = (parseInt(deg) - 90) * Math.PI / 180;
    ctx.fillText(lbl, cx + Math.cos(a) * (r - 14), cy + Math.sin(a) * (r - 14));
  }

  // Sun dot
  const sa = (azDeg - 90) * Math.PI / 180;
  const sr = r - 18;
  const sx = cx + Math.cos(sa) * sr;
  const sy = cy + Math.sin(sa) * sr;

  // Glow
  const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 10);
  grd.addColorStop(0,   'rgba(255,220,80,.9)');
  grd.addColorStop(0.4, 'rgba(255,180,40,.4)');
  grd.addColorStop(1,   'rgba(255,180,40,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(sx, sy, 10, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.fillStyle = '#ffd040';
  ctx.beginPath();
  ctx.arc(sx, sy, 4, 0, Math.PI * 2);
  ctx.fill();
}

function azFromPointer(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + canvas.width / 2;
  const cy = rect.top  + canvas.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  let deg = Math.round(Math.atan2(dy, dx) * 180 / Math.PI + 90);
  if (deg < 0) deg += 360;
  return deg % 360;
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  azSlider.value = azFromPointer(e);
  updateHillshade();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  azSlider.value = azFromPointer(e);
  updateHillshade();
});
document.addEventListener('mouseup', () => { dragging = false; });

// Touch support for the dial
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  dragging = true;
  azSlider.value = azFromPointer(e.touches[0]);
  updateHillshade();
});
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  azSlider.value = azFromPointer(e.touches[0]);
  updateHillshade();
});
document.addEventListener('touchend', () => { dragging = false; });

// ---------------------------------------------------------------------------
// Status bar: coordinates + elevation
// ---------------------------------------------------------------------------
const status = document.getElementById('status');

map.on('mousemove', e => {
  const { lng, lat } = e.lngLat;
  const elev = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
  const elevStr = elev !== null ? ` · ${Math.round(elev)} m` : '';
  status.textContent = `${lat.toFixed(5)}°N  ${lng.toFixed(5)}°E${elevStr}`;
});

map.on('mouseleave', () => {
  status.textContent = 'Move mouse over the map';
});

// ---------------------------------------------------------------------------
// Background selector
// ---------------------------------------------------------------------------
const BG_LAYERS = { osm: 'bg-osm', satellite: 'bg-satellite' };

document.getElementById('bg-select').addEventListener('change', e => {
  const chosen = e.target.value;
  Object.entries(BG_LAYERS).forEach(([key, id]) => {
    map.setLayoutProperty(id, 'visibility', key === chosen ? 'visible' : 'none');
  });
  saveSetting('background', chosen);
});

// ---------------------------------------------------------------------------
// OSM vector toggle
// ---------------------------------------------------------------------------
const OSM_LAYERS = [
  'osm-landuse','osm-water','osm-buildings',
  'osm-road-casing','osm-road-fill','osm-track','osm-path',
  'osm-waterway','osm-railway','osm-power','osm-natural-lines',
  'osm-peaks-tri','osm-peaks-label','osm-places',
];

toggleSlope.addEventListener('change', () => {
  map.setLayoutProperty('slope-overlay', 'visibility', toggleSlope.checked ? 'visible' : 'none');
  saveSetting('slope', toggleSlope.checked);
});

document.getElementById('toggle-osm').addEventListener('change', e => {
  const vis = e.target.checked ? 'visible' : 'none';
  OSM_LAYERS.forEach(id => {
    try { map.setLayoutProperty(id, 'visibility', vis); } catch(_) {}
  });
  saveSetting('osmVectors', e.target.checked);
});

// ---------------------------------------------------------------------------
// Peak layers — added after load so we can register a canvas triangle image
// (Open Sans Bold lacks the ▲ glyph; icon-image is more reliable)
// ---------------------------------------------------------------------------
map.on('load', () => {
  // Draw an orange triangle into a raw pixel buffer
  const sz = 22;
  const data = new Uint8ClampedArray(sz * sz * 4);
  for (let y = 2; y < sz - 1; y++) {
    const t = (y - 2) / (sz - 4);          // 0 = apex, 1 = base
    const hw = t * (sz / 2 - 1.5);
    const cx = sz / 2;
    for (let x = Math.ceil(cx - hw); x <= Math.floor(cx + hw); x++) {
      const i = (y * sz + x) * 4;
      data[i]   = 255;   // R
      data[i+1] = 140;   // G  → #ff8c00
      data[i+2] = 0;     // B
      data[i+3] = 230;   // A
    }
  }
  map.addImage('peak-tri', { width: sz, height: sz, data });

  // Triangle icon — visible from Z7, higher peaks win collisions
  map.addLayer({
    id: 'osm-peaks-tri',
    type: 'symbol',
    source: 'osmvec',
    'source-layer': 'peaks',
    minzoom: 7,
    layout: {
      'icon-image': 'peak-tri',
      'icon-size': ['interpolate', ['linear'], ['zoom'], 7, 0.55, 10, 0.75, 14, 1.0],
      'icon-allow-overlap': false,
      'symbol-sort-key': ['*', ['to-number', ['get', 'ele'], 0], -1],
    },
  });

  // Name + elevation label — appears from Z12, below the icon
  // Apply restored settings to the map now that style + layers are ready
  updateHillshade();
  applyAltitude();
  const savedBg = loadSetting('background');
  Object.entries(BG_LAYERS).forEach(([key, id]) =>
    map.setLayoutProperty(id, 'visibility', key === savedBg ? 'visible' : 'none'));
  const osmVis = loadSetting('osmVectors') ? 'visible' : 'none';
  OSM_LAYERS.forEach(id => { try { map.setLayoutProperty(id, 'visibility', osmVis); } catch(_) {} });
  if (loadSetting('terrain3d')) {
    map.setTerrain({ source: 'terrain', exaggeration: parseInt(vertSlider.value) / 10 });
    map.setPitch(50);
  }
  if (loadSetting('slope')) {
    map.setLayoutProperty('slope-overlay', 'visibility', 'visible');
  }

  map.addLayer({
    id: 'osm-peaks-label',
    type: 'symbol',
    source: 'osmvec',
    'source-layer': 'peaks',
    minzoom: 12,
    layout: {
      'text-field': ['format',
        ['coalesce', ['get', 'name'], ''], {'font-scale': 1.0},
        ['case',
          ['all', ['has', 'ele'],
                  ['!=', ['get', 'ele'], null],
                  ['!=', ['get', 'ele'], '']],
          ['concat', '\n',
            ['to-string', ['round', ['to-number', ['get', 'ele'], 0]]],
            ' m'],
          '',
        ], {'font-scale': 0.85},
      ],
      'text-font': ['Open Sans Bold'],
      'text-size': 11,
      'text-anchor': 'top',
      'text-offset': [0, 0.9],
      'symbol-sort-key': ['*', ['to-number', ['get', 'ele'], 0], -1],
    },
    paint: {
      'text-color': '#ff8c00',
      'text-halo-color': 'rgba(0,0,0,0.8)',
      'text-halo-width': 1.5,
    },
  });
});

// Initial compass draw
drawCompass(315);

// ---------------------------------------------------------------------------
// Place search — Nominatim, biased toward Dalarna
// ---------------------------------------------------------------------------
const searchInput   = document.getElementById('search-input');
const searchClear   = document.getElementById('search-clear');
const searchResults = document.getElementById('search-results');
const searchStatus  = document.getElementById('search-status');

let searchMarker = null;
let searchTimer  = null;
let activeIdx    = -1;

function showResults(items) {
  searchStatus.style.display = 'none';
  searchResults.innerHTML = '';
  searchResults.style.display = items.length ? 'block' : 'none';
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'search-item';
    const name = item.display_name.split(',').slice(0, 2).join(',');
    const sub  = item.display_name.split(',').slice(2, 4).join(',').trim();
    el.innerHTML = `${name}<small>${sub}</small>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); selectResult(item); });
    searchResults.appendChild(el);
  });
  activeIdx = -1;
}

function setStatus(msg) {
  searchResults.innerHTML = '';
  searchResults.appendChild(searchStatus);
  searchStatus.style.display = 'block';
  searchStatus.textContent = msg;
  searchResults.style.display = 'block';
}

function selectResult(item) {
  const lng = parseFloat(item.lon);
  const lat = parseFloat(item.lat);
  const bb  = item.boundingbox;           // [minlat, maxlat, minlon, maxlon]

  searchInput.value = item.display_name.split(',').slice(0, 2).join(',').trim();
  searchClear.style.display = 'block';
  closeDropdown();

  if (searchMarker) searchMarker.remove();
  searchMarker = new maplibregl.Marker({ color: '#5ba4cf' })
    .setLngLat([lng, lat])
    .addTo(map);

  if (bb) {
    map.fitBounds(
      [[parseFloat(bb[2]), parseFloat(bb[0])], [parseFloat(bb[3]), parseFloat(bb[1])]],
      { padding: 80, maxZoom: 15, duration: 800 }
    );
  } else {
    map.flyTo({ center: [lng, lat], zoom: 13, duration: 800 });
  }
}

function closeDropdown() {
  searchResults.style.display = 'none';
  activeIdx = -1;
}

async function doSearch(q) {
  if (q.length < 2) { closeDropdown(); return; }
  setStatus('Searching…');
  try {
    const params = new URLSearchParams({
      q, format: 'json', limit: 7,
      countrycodes: 'se',
      viewbox: '13.0,59.5,16.5,62.5',   // Dalarna bias
      bounded: '0',
    });
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?${params}`,
                             { headers: { 'Accept-Language': 'sv,en' } });
    const data = await res.json();
    if (data.length) showResults(data);
    else setStatus('No results');
  } catch(_) {
    setStatus('Search unavailable');
  }
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { closeDropdown(); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchResults.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    closeDropdown();
    searchInput.blur();
    return;
  }
  items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeDropdown();
  if (searchMarker) { searchMarker.remove(); searchMarker = null; }
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown();
});
</script>
</body>
