<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrain Viewer</title>
  <script src="https://unpkg.com/maplibre-gl@4.4.0/dist/maplibre-gl.js"></script>
  <link   href="https://unpkg.com/maplibre-gl@4.4.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <!-- Canvas 2D surfaces store pixels premultiplied by alpha internally, no
       matter the compositing mode — any pixel with alpha=0 permanently loses
       its RGB the instant it's drawn, which is fatal here since wetness is
       packed into the alpha channel as plain data, not real transparency.
       pako + UPNG.js decode PNG bytes directly, bypassing canvas entirely. -->
  <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
  <script src="https://unpkg.com/upng-js@2.1.0/UPNG.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="style-config.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<div id="map"></div>

<div id="search-wrap">
  <input id="search-input" type="text" placeholder="Search places…" autocomplete="off" spellcheck="false">
  <button id="search-clear" title="Clear">✕</button>
  <div id="search-results">
    <div id="search-status"></div>
  </div>
</div>

<div id="controls">
  <h2>Terrain viewer</h2>

  <!-- sun compass dial -->
  <div id="compass-wrap">
    <canvas id="sun-canvas" width="90" height="90"></canvas>
  </div>

  <div class="row">
    <label>Sun direction</label>
    <span class="val" id="az-val">315°</span>
  </div>
  <input type="range" id="azimuth" min="0" max="359" value="315">

  <div class="row">
    <label>Sun altitude</label>
    <span class="val" id="alt-val">35°</span>
  </div>
  <input type="range" id="altitude" min="5" max="85" value="35">

  <div class="row">
    <label>Shading strength</label>
    <span class="val" id="ex-val">0.6</span>
  </div>
  <input type="range" id="exaggeration" min="0" max="10" step="1" value="6">

  <hr class="sep">

  <div class="row"><label>Background</label></div>
  <select id="bg-select">
    <option value="osm">OpenStreetMap</option>
    <option value="satellite">Satellite (Esri)</option>
    <option value="slope">Slope colors</option>
    <option value="wetness">Wetness</option>
    <option value="vegetation">Vegetation height</option>
    <option value="none">None</option>
  </select>

  <div class="toggle-row">
    <label for="toggle-3d">3D terrain</label>
    <input type="checkbox" id="toggle-3d">
  </div>

  <div class="toggle-row">
    <label for="toggle-osm-lines">OSM lines</label>
    <input type="checkbox" id="toggle-osm-lines" checked>
  </div>

  <div class="toggle-row">
    <label for="toggle-osm-areas">OSM areas</label>
    <input type="checkbox" id="toggle-osm-areas">
  </div>

  <div class="toggle-row">
    <label for="toggle-trail-view">Trail view mode</label>
    <input type="checkbox" id="toggle-trail-view">
  </div>

  <div class="toggle-row" id="vert-row" style="opacity:.4;pointer-events:none">
    <label>Vertical scale</label>
    <span class="val" id="vert-val">1.5×</span>
  </div>
  <input type="range" id="vert-ex" min="5" max="40" step="1" value="15"
         style="opacity:.4;pointer-events:none">
</div>

<div id="status">Move mouse over the map</div>

<div id="auth-wrap">
  <div id="auth-signed-out">
    <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
    <button id="auth-send-link">Send magic link</button>
    <div id="auth-message"></div>
  </div>
  <div id="auth-signed-in" style="display:none">
    <span id="auth-email-display"></span>
    <button id="auth-sign-out">Sign out</button>
  </div>
</div>

<div id="entry-form-wrap" style="display:none">
  <div id="entry-form">
    <div class="entry-form-header">
      <h3>History</h3>
      <button id="entry-form-close" aria-label="Close" title="Close">✕</button>
    </div>
    <div id="entry-form-context"></div>
    <div id="entry-form-history"></div>

    <div class="entry-form-add-label">Add an update</div>
    <select id="entry-status-value" title="Setting this saves immediately">
      <option value="">No status update</option>
      <option value="clear">Clear</option>
      <option value="overgrown">Overgrown</option>
      <option value="partially_blocked">Partially blocked</option>
      <option value="fully_blocked">Fully blocked</option>
    </select>
    <textarea id="entry-comment-value" placeholder="Comment… (Enter to save, Ctrl+Enter for a new line)"></textarea>
    <input id="entry-image-value" type="file" accept="image/*" title="Uploads immediately">

    <div id="entry-form-message"></div>
  </div>
</div>

<div id="image-lightbox-wrap" style="display:none">
  <img id="image-lightbox-img" alt="Full-size photo">
</div>

<script>
// ---------------------------------------------------------------------------
// Auth (Supabase) — separate login from the Cloudflare Access one gating the
// site itself; see mtb-editor/CLAUDE.md for why these aren't unified. The
// anon/publishable key below is safe to expose client-side by design — it has
// no privileges beyond what Postgres RLS policies grant (see
// supabase/migrations/0001_trails_and_history.sql), the same way a public API
// key works for any Supabase project.
// ---------------------------------------------------------------------------
const SUPABASE_URL      = 'https://gergqrigdshvueljuvlm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_muIQnNtguCHA2i3cIdOsow_OLj866Fk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const authSignedOut    = document.getElementById('auth-signed-out');
const authSignedIn     = document.getElementById('auth-signed-in');
const authEmailInput   = document.getElementById('auth-email');
const authMessage      = document.getElementById('auth-message');
const authEmailDisplay = document.getElementById('auth-email-display');

// Tracked globally so the click handler can tell whether to offer "add entry"
// at all (Supabase writes need a logged-in user regardless of the Cloudflare
// Access session already gating the site — see mtb-editor/CLAUDE.md).
let currentSession = null;

function updateAuthUI(session) {
  currentSession = session;
  const signedIn = !!session;
  authSignedOut.style.display = signedIn ? 'none'  : 'flex';
  authSignedIn.style.display  = signedIn ? 'flex'  : 'none';
  if (signedIn) authEmailDisplay.textContent = session.user.email;
  refreshTrailData();
}

document.getElementById('auth-send-link').addEventListener('click', async () => {
  const email = authEmailInput.value.trim();
  if (!email) return;
  authMessage.textContent = 'Sending…';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.href },
  });
  authMessage.textContent = error ? `Error: ${error.message}` : 'Check your email for the link.';
});

document.getElementById('auth-sign-out').addEventListener('click', () => sb.auth.signOut());

sb.auth.onAuthStateChange((_event, session) => updateAuthUI(session));
sb.auth.getSession().then(({ data }) => updateAuthUI(data.session));

// ---------------------------------------------------------------------------
// Map init
// ---------------------------------------------------------------------------
// Single source of truth for tile locations. Self-detecting rather than a
// manual edit-before-deploy: in production this is served from the same R2
// custom domain as the tiles themselves (same-origin — required for
// pmtiles.js's fetches to carry the Cloudflare Access session cookie, since
// it sets no explicit `credentials` option and so defaults to 'same-origin'),
// so a relative path is both correct and never needs the domain name in source.
//
// Locally, the browser always talks to localhost:8080 — serve.py transparently
// proxies any /tiles or /fonts path that isn't present on disk to the real R2
// domain (using a Cloudflare Access service token), so a laptop with no local
// pmtiles files just works with no query params or origin-switching here.
const IS_LOCAL     = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const TILE_BASE    = IS_LOCAL ? 'http://localhost:8080/tiles' : '/tiles';
const GLYPHS_BASE  = IS_LOCAL ? 'http://localhost:8080/fonts' : '/fonts';

// Register PMTiles protocol so MapLibre can read .pmtiles files directly
const pmtilesProtocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile.bind(pmtilesProtocol));

// Shared PMTiles instance for terrain — reused by the slope protocol below
const terrainTiles  = new pmtiles.PMTiles(`${TILE_BASE}/terrain.pmtiles`);

function hexToRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function lerpColor(c0, c1, t) {
  return [
    Math.round(c0[0] + (c1[0] - c0[0]) * t),
    Math.round(c0[1] + (c1[1] - c0[1]) * t),
    Math.round(c0[2] + (c1[2] - c0[2]) * t),
  ];
}

// Piecewise-linear color for a slope angle (degrees) against VIEWER_STYLE.slope.stops.
function slopeColor(deg) {
  const stops = VIEWER_STYLE.slope.stops;
  if (deg <= stops[0].deg) return stops[0].color;
  for (let i = 1; i < stops.length; i++) {
    if (deg <= stops[i].deg) {
      const t = (deg - stops[i - 1].deg) / (stops[i].deg - stops[i - 1].deg);
      return lerpColor(stops[i - 1].color, stops[i].color, t);
    }
  }
  return stops[stops.length - 1].color;   // clamp beyond the last stop
}

// ---------------------------------------------------------------------------
// Slope overlay protocol — computes slope from terrain-RGB tiles in the browser
// and colors it per VIEWER_STYLE.slope.stops (see style-config.js)
// ---------------------------------------------------------------------------
maplibregl.addProtocol('slope', async (params) => {
  try {
    const [z, x, y] = params.url.replace('slope://', '').split('/').map(Number);
    const tile = await terrainTiles.getZxy(z, x, y);
    if (!tile) throw new Error('not found');
    // Decode with UPNG (not canvas) — see the wetness/vegheight protocol
    // below for why canvas-based decoding is unsafe for these tiles.
    const S = 256;
    const src = new Uint8Array(UPNG.toRGBA8(UPNG.decode(tile.data))[0]);

    // Metres per pixel at tile-centre latitude (Web Mercator)
    const n = Math.pow(2, z);
    const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * (y + 0.5) / n)));
    const mpp = 2 * Math.PI * 6378137 * Math.cos(latRad) / (S * n);

    function ele(r, c) {
      r = Math.max(0, Math.min(S - 1, r));
      c = Math.max(0, Math.min(S - 1, c));
      const i = (r * S + c) * 4;
      return -10000 + (src[i] * 65536 + src[i + 1] * 256 + src[i + 2]) * 0.1;
    }

    const out = new ImageData(S, S);
    const dst = out.data;
    for (let r = 0; r < S; r++) {
      for (let c = 0; c < S; c++) {
        const spanC = (c === 0 || c === S - 1) ? 1 : 2;
        const spanR = (r === 0 || r === S - 1) ? 1 : 2;
        const dx = (ele(r, c + 1) - ele(r, c - 1)) / (spanC * mpp);
        const dy = (ele(r + 1, c) - ele(r - 1, c)) / (spanR * mpp);
        const deg = Math.atan(Math.sqrt(dx * dx + dy * dy)) * 180 / Math.PI;
        const [R, G, B] = slopeColor(deg);
        const i = (r * S + c) * 4;
        dst[i] = R; dst[i + 1] = G; dst[i + 2] = B; dst[i + 3] = 255;
      }
    }

    const dstCanvas = new OffscreenCanvas(S, S);
    dstCanvas.getContext('2d').putImageData(out, 0, 0);
    const blob = await dstCanvas.convertToBlob({ type: 'image/png' });
    return { data: await blob.arrayBuffer() };
  } catch (_) {
    return { data: new ArrayBuffer(0) };
  }
});

// ---------------------------------------------------------------------------
// Wetness / vegetation-height overlay protocols — decode a single channel of
// the packed overlay RGBA tiles (see generate_overlay_tiles.py: B=CHM, A=wetness)
// into the two-stop ramps from VIEWER_STYLE (style-config.js).
// ---------------------------------------------------------------------------
const overlayTiles = new pmtiles.PMTiles(`${TILE_BASE}/overlay.pmtiles`);

function makeChannelProtocol(channelIndex, colorLow, colorHigh) {
  return async (params) => {
    const proto = params.url.split('://')[0];
    const [z, x, y] = params.url.replace(`${proto}://`, '').split('/').map(Number);
    try {
      const tile = await overlayTiles.getZxy(z, x, y);
      if (!tile) throw new Error('not found');
      // Canvas 2D surfaces store pixels premultiplied by alpha internally, no
      // matter the compositing mode — any pixel with A=0 (bone-dry ground,
      // very common) permanently loses its R/G/B the instant it's drawn,
      // since wetness lives in the alpha channel as plain data, not real
      // transparency. UPNG decodes the PNG bytes directly, bypassing canvas
      // (and its premultiplication) entirely.
      const S = 256;
      const src = new Uint8Array(UPNG.toRGBA8(UPNG.decode(tile.data))[0]);

      const out = new ImageData(S, S);
      const dst = out.data;
      for (let i = 0; i < src.length; i += 4) {
        const t = src[i + channelIndex] / 255;
        const [r, g, b] = lerpColor(colorLow, colorHigh, t);
        dst[i] = r; dst[i + 1] = g; dst[i + 2] = b; dst[i + 3] = 255;
      }

      const dstCanvas = new OffscreenCanvas(S, S);
      dstCanvas.getContext('2d').putImageData(out, 0, 0);
      const blob = await dstCanvas.convertToBlob({ type: 'image/png' });
      return { data: await blob.arrayBuffer() };
    } catch (_) {
      return { data: new ArrayBuffer(0) };
    }
  };
}

// A channel = wetness, B channel = CHM (see generate_overlay_tiles.py)
maplibregl.addProtocol('wetness',
  makeChannelProtocol(3, VIEWER_STYLE.wetness.colorLow, VIEWER_STYLE.wetness.colorHigh));
maplibregl.addProtocol('vegheight',
  makeChannelProtocol(2, VIEWER_STYLE.vegheight.colorLow, VIEWER_STYLE.vegheight.colorHigh));

const CENTER_LNG = 14.445;   // full Dalarna region
const CENTER_LAT = 61.005;
const START_ZOOM = 8;

// ---------------------------------------------------------------------------
// Settings persistence — defined before the map so its constructor can
// restore the last view (center/zoom/bearing/pitch) on load.
// ---------------------------------------------------------------------------
const DEFAULTS = {
  azimuth: 315, altitude: 35, exaggeration: 6,
  terrain3d: false, vertEx: 15,
  background: 'osm', osmLines: true, osmAreas: false, trailView: false,
  viewLng: CENTER_LNG, viewLat: CENTER_LAT, viewZoom: START_ZOOM,
  viewBearing: 0, viewPitch: 0,
};

function saveSetting(key, value) {
  try { localStorage.setItem('tv_' + key, JSON.stringify(value)); } catch(e) {}
}
function loadSetting(key) {
  try {
    const v = localStorage.getItem('tv_' + key);
    return v !== null ? JSON.parse(v) : DEFAULTS[key];
  } catch(e) { return DEFAULTS[key]; }
}

// Shared by applyAltitude() below.
function hillshadeShadowHighlight(altitudeDeg) {
  const t = altitudeDeg / 85;
  const ar = VIEWER_STYLE.hillshade.altitudeResponse;
  const shadowL    = ar.shadowLightMin    + t * (ar.shadowLightMax    - ar.shadowLightMin);
  const highlightL = ar.highlightLightMin + t * (ar.highlightLightMax - ar.highlightLightMin);
  return {
    shadowColor:    `hsl(${ar.shadowHue}, ${ar.shadowSat}%, ${Math.round(shadowL)}%)`,
    highlightColor: `hsl(${ar.highlightHue}, ${ar.highlightSat}%, ${Math.round(highlightL)}%)`,
  };
}

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: `${GLYPHS_BASE}/{fontstack}/{range}.pbf`,
    sources: {
      osm: {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        maxzoom: 19,
      },
      satellite: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        attribution: '© Esri, Maxar, Earthstar Geographics',
        maxzoom: 19,
      },
      terrain: {
        type: 'raster-dem',
        url: `pmtiles://${TILE_BASE}/terrain.pmtiles`,
        tileSize: 256,
        encoding: 'mapbox',
        minzoom: 8,
        maxzoom: 17,
        attribution: '© Lantmäteriet LiDAR',
      },
      coverage: {
        type: 'geojson',
        data: `${TILE_BASE}/coverage.geojson`,
      },
      'slope-tiles': {
        type: 'raster',
        tiles: ['slope://{z}/{x}/{y}'],
        tileSize: 256,
        minzoom: 8,
        maxzoom: 15,
      },
      'wetness-tiles': {
        type: 'raster',
        tiles: ['wetness://{z}/{x}/{y}'],
        tileSize: 256,
        minzoom: 12,
        maxzoom: 17,
      },
      'vegheight-tiles': {
        type: 'raster',
        tiles: ['vegheight://{z}/{x}/{y}'],
        tileSize: 256,
        minzoom: 12,
        maxzoom: 17,
      },
      osmvec: {
        type: 'vector',
        url: `pmtiles://${TILE_BASE}/dalarna.pmtiles`,
        attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
      },
      'selected-feature': {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      },
      // Trail status halos + point-located history entries — populated from
      // Supabase, see refreshTrailData()/updateTrailStatusOverlay() below.
      'trail-status': {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      },
      // Currently-selected qualifying trail in trail view mode — see
      // startPulse()/the click handler below. Empty except while a qualifying
      // trail is selected with trail view mode on.
      'trail-view-pulse': {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      },
      'history-points': {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      },
    },
    layers: [
      { id: 'bg-solid', type: 'background', paint: { 'background-color': VIEWER_STYLE.background.solid } },
      { id: 'bg-osm',       type: 'raster', source: 'osm',       paint: { 'raster-opacity': 1.0 } },
      { id: 'bg-satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1.0 },
        layout: { visibility: 'none' } },
      { id: 'slope-overlay', type: 'raster', source: 'slope-tiles',
        layout: { visibility: 'none' },
        paint: { 'raster-opacity': 0.65, 'raster-fade-duration': 0 },
      },
      { id: 'wetness-overlay', type: 'raster', source: 'wetness-tiles',
        layout: { visibility: 'none' },
        paint: { 'raster-opacity': 0.7, 'raster-fade-duration': 0 },
      },
      { id: 'vegheight-overlay', type: 'raster', source: 'vegheight-tiles',
        layout: { visibility: 'none' },
        paint: { 'raster-opacity': 0.7, 'raster-fade-duration': 0 },
      },
      { id: 'hillshade', type: 'hillshade', source: 'terrain', paint: {
          'hillshade-illumination-anchor': 'map',
          'hillshade-illumination-direction': VIEWER_STYLE.hillshade.illuminationDirection,
          'hillshade-exaggeration': VIEWER_STYLE.hillshade.exaggeration,
          'hillshade-shadow-color': VIEWER_STYLE.hillshade.shadowColor,
          'hillshade-highlight-color': VIEWER_STYLE.hillshade.highlightColor,
        }
      },
      // --- OSM vector overlay ---
      // Landuse fill (forest, farmland …)
      { id: 'osm-landuse', type: 'fill', source: 'osmvec', 'source-layer': 'landuse', minzoom: 9,
        paint: { 'fill-color': ['match', ['get', 'landuse'],
            ...VIEWER_STYLE.osm.landuse.match,
            VIEWER_STYLE.osm.landuse.fallback,
          ], 'fill-opacity': VIEWER_STYLE.osm.landuse.opacity },
      },
      // Water polygons
      { id: 'osm-water', type: 'fill', source: 'osmvec', 'source-layer': 'water', minzoom: 6,
        paint: { 'fill-color': VIEWER_STYLE.osm.water.color, 'fill-opacity': VIEWER_STYLE.osm.water.opacity },
      },
      // Buildings
      { id: 'osm-buildings', type: 'fill', source: 'osmvec', 'source-layer': 'buildings', minzoom: 14,
        paint: { 'fill-color': VIEWER_STYLE.osm.buildings.color, 'fill-opacity': VIEWER_STYLE.osm.buildings.opacity },
      },
      // Selected-feature highlight (click a line to select it) — wide blurred
      // glow + a crisper core, sitting *below* the actual line layers so the
      // real feature (its own color/width) stays fully visible on top, with
      // the highlight showing only as a halo in the margin around it.
      { id: 'selection-glow', type: 'line', source: 'selected-feature',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': VIEWER_STYLE.selection.color,
          'line-width': VIEWER_STYLE.selection.glowWidth,
          'line-opacity': VIEWER_STYLE.selection.glowOpacity,
          'line-blur': VIEWER_STYLE.selection.glowBlur,
        },
      },
      { id: 'selection-core', type: 'line', source: 'selected-feature',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': VIEWER_STYLE.selection.color,
          'line-width': VIEWER_STYLE.selection.coreWidth,
          'line-opacity': VIEWER_STYLE.selection.coreOpacity,
          'line-blur': VIEWER_STYLE.selection.coreBlur,
        },
      },
      // Trail status halo (Supabase trail_history status) — a trail with zero
      // status history gets no overlay at all ("not updated"), filtered out
      // client-side before this source is populated (see updateTrailStatusOverlay()).
      // A trail whose worst/latest status is 'clear' still gets an overlay
      // (green) — a *confirmed* clear report should read differently from a
      // trail nobody's ever reported on.
      { id: 'trail-status-overlay', type: 'line', source: 'trail-status',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': ['match', ['get', 'status'],
            'clear',              VIEWER_STYLE.trailStatus.clear,
            'overgrown',         VIEWER_STYLE.trailStatus.overgrown,
            'partially_blocked', VIEWER_STYLE.trailStatus.partially_blocked,
            'fully_blocked',     VIEWER_STYLE.trailStatus.fully_blocked,
            'transparent',
          ],
          'line-width': VIEWER_STYLE.trailStatus.width,
          'line-opacity': VIEWER_STYLE.trailStatus.opacity,
          'line-blur': 1,
        },
      },
      // Trail view mode: wide/blurred status glow for every qualifying trail
      // with *any* status history (reuses the 'trail-status' source built by
      // updateTrailStatusOverlay() — same data as trail-status-overlay above,
      // just styled as a glow). Hidden until trail view mode is on; filtered at
      // runtime to exclude whichever trail is currently selected, since that one
      // pulses instead (see 'trail-view-pulse-glow' + startPulse()/stopPulse()).
      { id: 'trail-view-glow', type: 'line', source: 'trail-status',
        layout: { visibility: 'none', 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color': ['match', ['get', 'status'],
            'clear',              VIEWER_STYLE.trailStatus.clear,
            'overgrown',         VIEWER_STYLE.trailStatus.overgrown,
            'partially_blocked', VIEWER_STYLE.trailStatus.partially_blocked,
            'fully_blocked',     VIEWER_STYLE.trailStatus.fully_blocked,
            'transparent',
          ],

// ---------------------------------------------------------------------------
// Sun compass dial
// ---------------------------------------------------------------------------
const canvas = document.getElementById('sun-canvas');
const ctx    = canvas.getContext('2d');
let dragging = false;

function drawCompass(azDeg) {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2, r = w / 2 - 4;

  ctx.clearRect(0, 0, w, h);

  // Tick marks
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  for (let i = 0; i < 360; i += 45) {
    const a = (i - 90) * Math.PI / 180;
    const inner = i % 90 === 0 ? r - 10 : r - 6;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    ctx.lineTo(cx + Math.cos(a) * r,     cy + Math.sin(a) * r);
    ctx.stroke();
  }

  // Cardinal labels
  const labels = { 0: 'N', 90: 'E', 180: 'S', 270: 'W' };
  ctx.fillStyle = '#666';
  ctx.font = '8px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const [deg, lbl] of Object.entries(labels)) {
    const a = (parseInt(deg) - 90) * Math.PI / 180;
    ctx.fillText(lbl, cx + Math.cos(a) * (r - 14), cy + Math.sin(a) * (r - 14));
  }

  // Sun dot
  const sa = (azDeg - 90) * Math.PI / 180;
  const sr = r - 18;
  const sx = cx + Math.cos(sa) * sr;
  const sy = cy + Math.sin(sa) * sr;

  // Glow
  const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 10);
  grd.addColorStop(0,   'rgba(255,220,80,.9)');
  grd.addColorStop(0.4, 'rgba(255,180,40,.4)');
  grd.addColorStop(1,   'rgba(255,180,40,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(sx, sy, 10, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.fillStyle = '#ffd040';
  ctx.beginPath();
  ctx.arc(sx, sy, 4, 0, Math.PI * 2);
  ctx.fill();
}

function azFromPointer(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + canvas.width / 2;
  const cy = rect.top  + canvas.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  let deg = Math.round(Math.atan2(dy, dx) * 180 / Math.PI + 90);
  if (deg < 0) deg += 360;
  return deg % 360;
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  azSlider.value = azFromPointer(e);
  updateHillshade();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  azSlider.value = azFromPointer(e);
  updateHillshade();
});
document.addEventListener('mouseup', () => { dragging = false; });

// Touch support for the dial
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  dragging = true;
  azSlider.value = azFromPointer(e.touches[0]);
  updateHillshade();
});
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  azSlider.value = azFromPointer(e.touches[0]);
  updateHillshade();
});
document.addEventListener('touchend', () => { dragging = false; });

// ---------------------------------------------------------------------------
// Status bar: coordinates + elevation
// ---------------------------------------------------------------------------
const status = document.getElementById('status');

function zoomStatus() {
  const z = map.getZoom();
  const terrainZ = Math.min(Math.floor(z), 17);
  return `Z${z.toFixed(1)}  (terrain tile Z${terrainZ})`;
}

// Real elevation readout, read directly from terrain.pmtiles bytes rather
// than MapLibre's queryTerrainElevation() — that function samples whatever
// zoom-level DEM tile the current 3D mesh happens to have loaded for the
// active view (a documented bug: maplibre/maplibre-gl-js#6701), not
// necessarily our best available z17 data, and `exaggerated: false` does not
// actually suppress the vertical-scale multiplier either. Confirmed on a
// known point (Bondberget, 299m): queryTerrainElevation gave 0m at Z22 and a
// scale-dependent 70-540m at Z12, nowhere near correct. Sampling the tile
// ourselves (same trusted decode path as the slope shader) sidesteps both bugs.
const ELEVATION_ZOOM = 17;   // terrain source's actual maxzoom — always use the best data, independent of camera zoom
let elevTileCache = null;    // { key: 'z/x/y', data: Uint8Array } — avoids redecoding on every mousemove within the same tile

async function sampleElevation(lng, lat) {
  const n = Math.pow(2, ELEVATION_ZOOM);
  const xFrac = (lng + 180) / 360 * n;
  const latRad = lat * Math.PI / 180;
  const yFrac = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
  const tx = Math.floor(xFrac), ty = Math.floor(yFrac);
  const key = `${tx}/${ty}`;

  let data;
  if (elevTileCache && elevTileCache.key === key) {
    data = elevTileCache.data;
  } else {
    const tile = await terrainTiles.getZxy(ELEVATION_ZOOM, tx, ty);
    if (!tile) return null;
    data = new Uint8Array(UPNG.toRGBA8(UPNG.decode(tile.data))[0]);
    elevTileCache = { key, data };
  }

  const S = 256;
  const px = Math.min(S - 1, Math.floor((xFrac - tx) * S));
  const py = Math.min(S - 1, Math.floor((yFrac - ty) * S));
  const i = (py * S + px) * 4;
  return -10000 + (data[i] * 65536 + data[i + 1] * 256 + data[i + 2]) * 0.1;
}

let elevRequestId = 0;
map.on('mousemove', e => {
  const { lng, lat } = e.lngLat;
  status.textContent = `${zoomStatus()}  ·  ${lat.toFixed(5)}°N  ${lng.toFixed(5)}°E`;

  const myRequest = ++elevRequestId;
  sampleElevation(lng, lat).then(elev => {
    if (myRequest !== elevRequestId) return;   // a newer mousemove fired first — drop this stale result
    const elevStr = elev !== null ? ` · ${Math.round(elev)} m` : '';
    status.textContent = `${zoomStatus()}  ·  ${lat.toFixed(5)}°N  ${lng.toFixed(5)}°E${elevStr}`;
  }).catch(() => {});
});

map.on('zoom', () => {
  status.textContent = zoomStatus();
});

map.on('mouseleave', () => {
  status.textContent = zoomStatus();
});

// Click a line feature (trail, road, waterway, ...) to select it and show a
// popup linking back to the source OSM way. Point features (peaks, places)
// are deliberately excluded for now — no click use for those yet.
// 'osm-road-casing' is skipped: it's just the wider outline of 'osm-road-fill'
// on the same source-layer, querying both would return the same way twice.
const CLICKABLE_LINE_LAYERS = [
  'osm-road-fill', 'osm-track', 'osm-path',
  'osm-waterway', 'osm-railway', 'osm-power', 'osm-natural-lines',
];

function featureLabel(props) {
  // Priority: the way's own name > the route relation's name (many named
  // trails are split into anonymous segments — the relation is often the
  // only place the real name lives, see extract_osm.py's RouteRelationCollector)
  // > mtb:name (mtb_name — informal per-segment community label) > tag fallbacks.
  return props.name || props.route_name || props.mtb_name || props.highway
      || props.waterway || props.railway || props.power || props.natural || 'Unnamed way';
}

// What counts as a "trail" for the Supabase editor (see mtb-editor/CLAUDE.md):
// a way qualifies via mtb:name or mtb:scale; a relation qualifies via route=mtb
// alone (it doesn't need its own mtb:name/mtb:scale — those live on the member
// ways, or nowhere at all). A relation's route groups multiple way segments
// into one trail identity, so prefer it over the individual way when present
// — this is a deliberate priority rule (a clicked/annotated segment that's
// part of a named route should resolve to that route, not its own bare way
// identity), not just a fallback.
//
// NOT HANDLED: a way that's a member of *multiple* same-priority route=mtb
// relations only ever sees one of them here, because the pipeline itself
// only records one relation per way (see RouteRelationCollector in
// foundation/extract_osm.py — deliberately not fixed there yet either). Once
// that's fixed to carry a list, clicking such a way should show a picker
// (trail name/length/scale per candidate) instead of silently picking one —
// there's no data to pick between yet, so no picker UI exists here.
function getTrailIdentity(props) {
  if (props.route_type === 'mtb' && props.route_relation_id != null) {
    return { osm_type: 'relation', osm_id: props.route_relation_id };
  }
  if (props.mtb_scale || props.mtb_name) {
    return { osm_type: 'way', osm_id: props.osm_id };
  }
  return null;
}

// MapLibre-expression mirror of getTrailIdentity() above, for data-driven paint
// (dimming non-qualifying paths in trail view mode) rather than per-feature JS
// checks — keep the two in sync if trail qualification rules ever change.
const QUALIFYING_TRAIL_EXPR = ['any',
  ['all', ['==', ['get', 'route_type'], 'mtb'], ['has', 'route_relation_id']],
  ['has', 'mtb_scale'],
  ['has', 'mtb_name'],
];

// Thin lines are hard to hit pixel-perfect (paths render as little as 0.5px
// wide at low zoom) — query a small box around the click instead of the
// exact point.
const CLICK_HIT_TOLERANCE = 6;

// Trail view mode state — see applyTrailViewMode()/startPulse() below.
let trailViewMode = false;
let pulseRAF = null;
let pulseStart = 0;

function stopPulse() {
  if (pulseRAF != null) cancelAnimationFrame(pulseRAF);
  pulseRAF = null;
  if (map.getLayer('trail-view-pulse-glow')) {
    map.setPaintProperty('trail-view-pulse-glow', 'line-opacity', 0);
  }
}

// Breathing opacity/width on the selected trail's glow — color is set once by
// the caller (worst-status color, or noInfoPulseColor if the trail has no
// status history), only opacity/width animate here.
function startPulse(color) {
  stopPulse();
  map.setPaintProperty('trail-view-pulse-glow', 'line-color', color);
  pulseStart = performance.now();
  const cfg = VIEWER_STYLE.trailView.pulse;
  function frame(t) {
    const phase = ((t - pulseStart) % cfg.periodMs) / cfg.periodMs;
    const s = (Math.sin(phase * Math.PI * 2) + 1) / 2;   // 0..1 ease
    map.setPaintProperty('trail-view-pulse-glow', 'line-opacity',
      cfg.opacityMin + s * (cfg.opacityMax - cfg.opacityMin));
    map.setPaintProperty('trail-view-pulse-glow', 'line-width',
      cfg.widthMin + s * (cfg.widthMax - cfg.widthMin));
    pulseRAF = requestAnimationFrame(frame);
  }
  pulseRAF = requestAnimationFrame(frame);
}

// Clears both the gold click-highlight (selected-feature) and, if a qualifying
// trail's status glow was pulsing in trail view mode, that too — trail-view-glow's
// filter (which hides the pulsing trail from the static glow layer) resets so
// the trail goes back to showing its normal static glow once deselected.
function clearSelection() {
  const src = map.getSource('selected-feature');
  if (src) src.setData({ type: 'FeatureCollection', features: [] });
  const pulseSrc = map.getSource('trail-view-pulse');
  if (pulseSrc) pulseSrc.setData({ type: 'FeatureCollection', features: [] });
  if (map.getLayer('trail-view-glow')) map.setFilter('trail-view-glow', null);
  stopPulse();
}

// Dims tracks/roads/non-qualifying paths so qualifying trails (scale core +
// status glow) visually pop; restores normal opacities on toggle-off. Turning
// the mode off also drops any active selection/pulse rather than leaving one
// stranded in an inconsistent (mode-off but still pulsing) state.
function applyTrailViewMode(on) {
  map.setLayoutProperty('trail-view-glow', 'visibility', on ? 'visible' : 'none');
  map.setLayoutProperty('trail-view-pulse-glow', 'visibility', on ? 'visible' : 'none');
  map.setPaintProperty('osm-path', 'line-opacity', on
    ? ['case', QUALIFYING_TRAIL_EXPR, VIEWER_STYLE.osm.path.opacity, VIEWER_STYLE.trailView.dimOpacity]
    : VIEWER_STYLE.osm.path.opacity);
  map.setPaintProperty('osm-track', 'line-opacity',
    on ? VIEWER_STYLE.trailView.dimOpacity : VIEWER_STYLE.osm.track.opacity);
  map.setPaintProperty('osm-road-casing', 'line-opacity',
    on ? VIEWER_STYLE.trailView.dimOpacity : VIEWER_STYLE.osm.roadCasing.opacity);
  map.setPaintProperty('osm-road-fill', 'line-opacity',
    on ? VIEWER_STYLE.trailView.dimOpacity : VIEWER_STYLE.osm.roadFill.opacity);
  if (!on) clearSelection();
}

toggleTrailView.addEventListener('change', e => {
  trailViewMode = e.target.checked;
  applyTrailViewMode(trailViewMode);
  saveSetting('trailView', trailViewMode);
});

let featurePopup = null;
map.on('click', e => {
  const layers = CLICKABLE_LINE_LAYERS.filter(id => map.getLayer(id));
  const bbox = [
    [e.point.x - CLICK_HIT_TOLERANCE, e.point.y - CLICK_HIT_TOLERANCE],
    [e.point.x + CLICK_HIT_TOLERANCE, e.point.y + CLICK_HIT_TOLERANCE],
  ];
  const features = map.queryRenderedFeatures(bbox, { layers });

  // Tear down any previous selection first — removing the old popup fires
  // its 'close' handler (clearSelection), which must happen *before* we set
  // the new highlight below, or it wipes out the selection we just made.
  if (featurePopup) { featurePopup.remove(); featurePopup = null; }

  if (!features.length) {
    clearSelection();
    return;
  }

  const f = features[0];
  const label = featureLabel(f.properties);
  // Link to the route relation when this segment belongs to one — shows the
  // whole trail, not just the clicked fragment — otherwise fall back to the way.
  const relId = f.properties.route_relation_id;
  const osmId = f.properties.osm_id;
  let linkHtml;
  if (relId != null) {
    linkHtml = `<a href="https://www.openstreetmap.org/relation/${relId}" target="_blank" rel="noopener">View route on OpenStreetMap ↗</a>`;
  } else if (osmId != null) {
    linkHtml = `<a href="https://www.openstreetmap.org/way/${osmId}" target="_blank" rel="noopener">View on OpenStreetMap ↗</a>`;
  } else {
    linkHtml = '<em>no OSM id on this feature</em>';
  }

  // Trail entry buttons — only offered for features that qualify as a trail
  // (see getTrailIdentity) and only when logged in to Supabase (Cloudflare
  // Access already gates the site, but writing history entries is a separate
  // login — see mtb-editor/CLAUDE.md). "Trail history" always shows (it opens
  // the unified view+add panel — see openEntryForm — whether or not the trail
  // has any history yet). Computed here (rather than after the highlight
  // below) because trail view mode needs it to decide which highlight style
  // to use.
  const identity = getTrailIdentity(f.properties);
  const historyKey = identity ? `${identity.osm_type}:${identity.osm_id}` : null;
  let trailButtonsHtml = '';
  if (identity) {
    trailButtonsHtml = currentSession
      ? `<div class="popup-trail-actions">
           <button id="popup-trail-history">Trail history</button>
           <button id="popup-add-point-entry">Add entry at this point</button>
         </div>`
      : `<div class="popup-trail-hint">Log in to add trail entries</div>`;
  }

  // Vector tiles clip long ways at tile boundaries, so a single OSM way can
  // render as several separate features (same osm_id, different clipped
  // geometry) — highlight every currently-rendered fragment of this way, not
  // just the one under the cursor, or the glow looks like several unrelated
  // segments instead of one trail. Querying with no geometry arg searches the
  // whole current viewport rather than a single point/box.
  // When the clicked feature qualifies as a trail (identity != null), match by
  // trail identity rather than raw osm_id — a route relation's trail spans
  // multiple distinct ways (each with their own osm_id) grouped only by
  // route_relation_id, so an osm_id-only match would miss every other way in
  // the route and only highlight/pulse the one segment actually clicked.
  const fragments = identity
    ? map.queryRenderedFeatures(undefined, { layers }).filter(ff => {
        const fid = getTrailIdentity(ff.properties);
        return fid && fid.osm_type === identity.osm_type && fid.osm_id === identity.osm_id;
      })
    : osmId != null
      ? map.queryRenderedFeatures(undefined, { layers }).filter(ff => ff.properties.osm_id === osmId)
      : [f];
  const fragmentFeatures = fragments.map(ff => ({ type: 'Feature', geometry: ff.geometry, properties: {} }));

  // In trail view mode, a qualifying trail's selection indicator is its own
  // status glow starting to pulse (see startPulse()) rather than the generic
  // gold click-highlight — the pulse itself communicates "this is selected".
  // Everything else (non-qualifying features, or any feature when trail view
  // mode is off) keeps the normal gold selection-glow/selection-core halo.
  if (trailViewMode && identity) {
    map.getSource('selected-feature').setData({ type: 'FeatureCollection', features: [] });
    map.getSource('trail-view-pulse').setData({ type: 'FeatureCollection', features: fragmentFeatures });
    const key = `${identity.osm_type}:${identity.osm_id}`;
    map.setFilter('trail-view-glow', ['!=', ['get', 'identity_key'], key]);
    // trailStatusMap only has an entry once the trail has *some* status
    // history (including 'clear') — genuinely never-updated trails fall
    // through to the yellow "no info" pulse.
    const worst = trailStatusMap.get(key);
    const pulseColor = worst ? VIEWER_STYLE.trailStatus[worst] : VIEWER_STYLE.trailView.noInfoPulseColor;
    startPulse(pulseColor);
  } else {
    map.getSource('trail-view-pulse').setData({ type: 'FeatureCollection', features: [] });
    map.setFilter('trail-view-glow', null);
    stopPulse();
    map.getSource('selected-feature').setData({ type: 'FeatureCollection', features: fragmentFeatures });
  }

  if (featurePopup) featurePopup.remove();
  featurePopup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '240px' })
    .setLngLat(e.lngLat)
    .setHTML(`<strong>${label}</strong><br>${linkHtml}${trailButtonsHtml}`)
    .addTo(map);
  featurePopup.on('close', clearSelection);

  if (identity) {
    const popupEl = featurePopup.getElement();
    const trailHistoryBtn = popupEl.querySelector('#popup-trail-history');
    const pointBtn        = popupEl.querySelector('#popup-add-point-entry');
    if (trailHistoryBtn) trailHistoryBtn.addEventListener('click', () => {
      featurePopup.remove();
      // Seed trailId from the cache if this trail's been touched before, so
      // the panel's history list loads immediately instead of showing "No
      // history yet" until the first add resolves it (see pendingEntry's
      // trade-off comment near openEntryForm).
      openEntryForm({
        identity, props: f.properties, label, location: null, clickPoint: e.lngLat,
        trailId: trailIdByKey.get(historyKey) || null,
      });
    });
    if (pointBtn) pointBtn.addEventListener('click', () => {
      featurePopup.remove();
      openEntryForm({ identity, props: f.properties, label, location: e.lngLat, clickPoint: e.lngLat });
    });
  }
});

// Pointer cursor over the same clickable line features, so it's obvious
// what's selectable and easier to aim at a thin line precisely.
CLICKABLE_LINE_LAYERS.forEach(id => {
  map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
});

// ---------------------------------------------------------------------------
// Trail history — add entries (status/comment/image) to a trail or a point on
// it, and show existing entries on the map. See supabase/migrations/ and
// mtb-editor/CLAUDE.md for the schema/design.
// ---------------------------------------------------------------------------
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const entryFormWrap     = document.getElementById('entry-form-wrap');
const entryFormContext  = document.getElementById('entry-form-context');
const entryFormHistory  = document.getElementById('entry-form-history');
const entryStatusValue  = document.getElementById('entry-status-value');
const entryCommentValue = document.getElementById('entry-comment-value');
const entryImageValue   = document.getElementById('entry-image-value');
const entryFormMessage  = document.getElementById('entry-form-message');

// { identity, props, label, location, clickPoint, trailId, locationId }.
// trailId/locationId, when passed in already known, mean "definitely already
// exists, skip ensureTrailRow/find_or_create_location entirely" — today only
// the history-point marker's "Add entry here" flow has both from the start
// (its own trail_id/location_id), since it's the only flow with no
// identity/props/clickPoint to resolve them from otherwise. The trail-popup
// flow instead seeds trailId as a *hint* from the trailIdByKey cache so the
// history list can load immediately without waiting for a submit — a trade-off
// worth knowing: once a trail has that cached id, ensureTrailRow's upsert
// (which refreshes display_name/display_mtb_scale from current OSM tags) no
// longer re-runs on every subsequent add, only the very first time the trail
// is ever touched. Acceptable since those fields are just a display cache
// (foundation/CLAUDE.md), not the source of truth.
let pendingEntry = null;

// Opens the unified history-view-and-add panel and loads whatever history
// already exists for it (see refreshEntryFormHistory) — replaces the old
// separate "Show history" button/inline display entirely.
async function openEntryForm({ identity, props, label, location, clickPoint, trailId, locationId }) {
  pendingEntry = { identity, props, label, location, clickPoint, trailId: trailId || null, locationId: locationId || null };
  entryFormContext.textContent = label;
  entryStatusValue.value = '';
  entryCommentValue.value = '';
  entryImageValue.value = '';
  entryFormMessage.textContent = '';
  entryFormWrap.style.display = 'flex';
  await refreshEntryFormHistory();
}

function closeEntryForm() {
  entryFormWrap.style.display = 'none';
  pendingEntry = null;
}
document.getElementById('entry-form-close').addEventListener('click', closeEntryForm);

// Re-renders the history list from pendingEntry's *current* trailId/locationId
// — called on open and again after each successful add, so the panel keeps
// reflecting what's actually saved without needing to be reopened. A known
// location takes priority over a known trail when both exist (a marker shows
// its own point's history, not the whole trail's — matches the old
// 'location_id'-filtered fetch for markers).
async function refreshEntryFormHistory() {
  if (!pendingEntry) return;
  const { trailId, locationId } = pendingEntry;
  entryFormHistory.innerHTML = locationId
    ? await fetchHistoryHtml('location_id', locationId)
    : trailId
      ? await fetchHistoryHtml('trail_id', trailId)
      : '<div class="history-empty">No history yet.</div>';
}

// Finds an existing trails row for this OSM feature, or inserts one (lazy
// population — see mtb-editor/CLAUDE.md). Upsert rather than select-then-insert
// so two people touching the same trail at once can't hit the unique constraint.
// clickPoint is just for caching a display location — always the point the
// user actually clicked, regardless of whether this entry itself is
// trail-level or point-level (see the two openEntryForm call sites above).
async function ensureTrailRow(identity, props, clickPoint) {
  const displayName = props.route_name || props.name || props.mtb_name || null;
  const { data, error } = await sb.from('trails')
    .upsert({
      osm_type: identity.osm_type,
      osm_id: identity.osm_id,
      display_name: displayName,
      display_mtb_scale: props.mtb_scale || null,
      display_lon: clickPoint ? clickPoint.lng : null,
      display_lat: clickPoint ? clickPoint.lat : null,
      osm_synced_at: new Date().toISOString(),
    }, { onConflict: 'osm_type,osm_id' })
    .select('id')
    .single();
  if (error) throw error;
  return data.id;
}

// Resolves (and caches on pendingEntry) the trail/location this panel is
// scoped to — shared by every auto-submit handler below, since each one can
// fire independently (status change, image pick, comment Enter) and all need
// the same ids. Idempotent: a later call in the same panel session just
// returns the already-resolved ids instead of re-upserting/re-snapping.
async function ensurePendingIds() {
  const { identity, props, location, clickPoint } = pendingEntry;
  const trailId = pendingEntry.trailId
    || (identity ? await ensureTrailRow(identity, props, clickPoint) : null);
  pendingEntry.trailId = trailId;

  // A brand-new point (starting fresh from a trail's popup) snaps to an
  // existing nearby location if one's within range, rather than always
  // creating a new one — see find_or_create_location in
  // supabase/migrations/0004_locations.sql. A point added via an existing
  // marker's "Add entry here" already has locationId and skips this, so it
  // can never end up attached to the wrong nearby location.
  let locationId = pendingEntry.locationId;
  if (!locationId && location) {
    const { data: locId, error: locErr } = await sb.rpc('find_or_create_location', {
      p_lng: location.lng, p_lat: location.lat,
    });
    if (locErr) throw locErr;
    locationId = locId;
    pendingEntry.locationId = locationId;
  }
  return { trailId, locationId };
}

// Inserts one row and refreshes the panel/map — the shared tail end of every
// auto-submit handler below.
async function submitEntry(entry_type, value) {
  if (!pendingEntry || !currentSession) return;
  entryFormMessage.textContent = 'Saving…';
  try {
    const { trailId, locationId } = await ensurePendingIds();
    const row = { trail_id: trailId, entry_type, value };
    if (locationId) row.location_id = locationId;
    const { error } = await sb.from('trail_history').insert(row);
    if (error) throw error;
    entryFormMessage.textContent = '';
    await refreshEntryFormHistory();
    refreshTrailData();
  } catch (err) {
    entryFormMessage.textContent = `Error: ${err.message}`;
  }
}

// Downscales an image client-side (longest edge maxDim, JPEG) for the history
// list's thumbnail — the full-resolution original is still uploaded and used
// for the lightbox, but the list itself only ever downloads the small one.
async function makeThumbnail(file, maxDim = 400, quality = 0.82) {
  const bitmap = await createImageBitmap(file);
  const scale = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
  const w = Math.max(1, Math.round(bitmap.width * scale));
  const h = Math.max(1, Math.round(bitmap.height * scale));
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
  bitmap.close();
  return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
}

// Uploads the original to the private trail-images bucket under a per-trail
// prefix, plus a generated thumbnail alongside it (same id, so the two are
// easy to find/clean up together on delete). Thumbnail generation failing
// (unsupported format, corrupt file, etc.) doesn't block the real upload —
// fetchHistoryHtml falls back to the full image if no thumb_path exists.
async function uploadEntryImage(file, prefix) {
  const id = crypto.randomUUID();
  const path = `${prefix}/${id}-${file.name}`;
  const { error } = await sb.storage.from('trail-images').upload(path, file);
  if (error) throw error;

  let thumbPath = null;
  try {
    const thumbBlob = await makeThumbnail(file);
    if (thumbBlob) {
      thumbPath = `${prefix}/${id}-thumb.jpg`;
      const { error: thumbErr } = await sb.storage.from('trail-images')
        .upload(thumbPath, thumbBlob, { contentType: 'image/jpeg' });
      if (thumbErr) throw thumbErr;
    }
  } catch (thumbGenErr) {
    console.error('Thumbnail generation failed, falling back to the full image', thumbGenErr);
    thumbPath = null;
  }

  return { path, thumbPath };
}

// Setting a status saves immediately — no separate Add step. Resets back to
// the blank "No status update" option right away so the dropdown always
// reads as "nothing pending"; the history list below is what shows what's
// actually been saved.
entryStatusValue.addEventListener('change', async () => {
  const status = entryStatusValue.value;
  entryStatusValue.value = '';
  if (!status) return;
  await submitEntry('status', { status });
});

// Picking a file uploads immediately — no separate Add step.
entryImageValue.addEventListener('change', async () => {
  const file = entryImageValue.files[0];
  entryImageValue.value = '';
  if (!file || !pendingEntry || !currentSession) return;
  entryFormMessage.textContent = 'Uploading…';
  try {
    const { trailId, locationId } = await ensurePendingIds();
    const { path, thumbPath } = await uploadEntryImage(file, trailId || locationId);
    await submitEntry('image', { path, thumb_path: thumbPath, content_type: file.type, size_bytes: file.size });
  } catch (err) {
    entryFormMessage.textContent = `Error: ${err.message}`;
  }
});

// Enter saves the comment immediately (chat-style); Ctrl+Enter inserts a
// literal newline instead (falls through to the textarea's normal behavior).
entryCommentValue.addEventListener('keydown', async e => {
  if (e.key !== 'Enter' || e.ctrlKey) return;
  e.preventDefault();
  const text = entryCommentValue.value.trim();
  if (!text) return;
  entryCommentValue.value = '';
  await submitEntry('comment', { text });
});

// trailStatusMap: "osm_type:osm_id" -> worst currently-active status string
// across the trail. "Worst" means: take the *latest* status at each point on
// the trail separately (the trail-level bucket, i.e. entries with no
// location_id, plus every location_id tied to it — e.g. "tree fell here" then
// later "cleared" at that same spot resolves to 'clear' for that point), then
// the highest-severity value across those latest-per-point results wins. This
// matters because a recent 'clear' logged at one spot must not hide an older,
// still-unresolved 'fully_blocked' logged somewhere else on the same trail.
// trailIdByKey: same keys -> trails.id, so the trail popup's "Trail history"
// button doesn't need a round trip to Supabase just to look up the id before
// opening the panel (see openEntryForm).
// Both rebuilt from Supabase on login/logout and after each new entry; the
// visible overlay (updateTrailStatusOverlay) is then recomputed against
// whatever's actually rendered, since Supabase only knows the OSM reference
// for a trail, not its geometry.
const STATUS_SEVERITY = { clear: 0, overgrown: 1, partially_blocked: 2, fully_blocked: 3 };
const trailStatusMap = new Map();
const trailIdByKey = new Map();

async function refreshTrailData() {
  const statusSource = map.getSource('trail-status');
  const pointsSource = map.getSource('history-points');
  if (!statusSource || !pointsSource) return;   // style not ready yet — moveend/load will retry

  if (!currentSession) {
    trailStatusMap.clear();
    trailIdByKey.clear();
    updateTrailStatusOverlay();
    pointsSource.setData({ type: 'FeatureCollection', features: [] });
    return;
  }

  // All history entries with their trail's OSM reference. Small data volume
  // for now, so deriving "latest status per trail" and "does this trail have
  // any history at all" client-side from one query is fine rather than
  // adding a DB view for it.
  const { data: historyRows, error: historyErr } = await sb
    .from('trail_history')
    .select('trail_id, location_id, entry_type, created_at, value, trails!inner(id, osm_type, osm_id)')
    .order('created_at', { ascending: false });
  if (historyErr) console.error(historyErr);

  trailStatusMap.clear();
  trailIdByKey.clear();
  // pointKey -> latest status at that point (trail-level bucket if
  // location_id is null, otherwise that location) — historyRows is
  // newest-first, so the first status entry seen per point is its latest.
  const latestPerPoint = new Map();
  for (const row of historyRows || []) {
    const key = `${row.trails.osm_type}:${row.trails.osm_id}`;
    trailIdByKey.set(key, row.trails.id);
    if (row.entry_type === 'status') {
      const pointKey = `${key} ${row.location_id ?? ''}`;
      if (!latestPerPoint.has(pointKey)) latestPerPoint.set(pointKey, { key, status: row.value.status });
    }
  }
  for (const { key, status } of latestPerPoint.values()) {
    const prev = trailStatusMap.get(key);
    if (!prev || STATUS_SEVERITY[status] > STATUS_SEVERITY[prev]) trailStatusMap.set(key, status);
  }
  updateTrailStatusOverlay();

  // One marker per *location*, not per entry — a location can accumulate many
  // history entries over time (e.g. "tree fell here" then later "cleared"),
  // and all of them belong to the same marker/history list rather than each
  // becoming its own disconnected dot (see supabase/migrations/0004_locations.sql).
  // `geojson` is a computed column on locations (same reasoning as trail_history's
  // now-removed location_geojson in 0003): geography columns come back as WKB hex
  // text via the REST API by default, not GeoJSON.
  // Rows are ordered newest-first, so the first row seen per location_id is that
  // location's latest entry — used to style/color the marker without a second query.
  const { data: pointRows, error: pointErr } = await sb
    .from('trail_history')
    .select('entry_type, value, created_at, trail_id, location_id, locations!inner(id, geojson)')
    .not('location_id', 'is', null)
    .order('created_at', { ascending: false });
  if (pointErr) console.error(pointErr);

  const features = [];
  const seenLocations = new Set();
  for (const r of pointRows || []) {
    if (seenLocations.has(r.location_id)) continue;
    if (!r.locations || !r.locations.geojson) continue;
    seenLocations.add(r.location_id);
    features.push({
      type: 'Feature',
      geometry: r.locations.geojson,
      properties: {
        location_id: r.location_id,
        trail_id: r.trail_id,
        entry_type: r.entry_type,
        status: r.entry_type === 'status' ? r.value.status : null,
      },
    });
  }
  pointsSource.setData({ type: 'FeatureCollection', features });
}

// id -> { path, thumb_path } for every image entry currently rendered in the
// history list — the delete/lightbox handlers below look paths up here
// rather than round-tripping user-controlled filenames through an HTML
// attribute: escapeHtml only escapes for *text* content (setting
// .textContent then reading .innerHTML doesn't escape quote characters),
// which is unsafe for attribute-value context — a filename containing a
// `"` could break out of a data-* attribute otherwise.
const historyEntryData = new Map();

// Fetches every history entry for a trail (filterColumn='trail_id') or a point
// location (filterColumn='location_id') and renders it as an HTML list, newest
// first — used by the unified history panel (openEntryForm/refreshEntryFormHistory)
// for both a trail's full history and a single point's (a marker is a place
// things happen to over time, e.g. "tree fell here" followed later by
// "cleared", not a single fixed state).
//
// A status entry is "protected" (no delete button) exactly when it's the
// *latest* status logged at its own point — the trail-level bucket, or a
// specific location — and that status isn't 'clear': i.e. it's an active
// problem report. Deleting it would silently make the trail look better than
// it actually is, so that one specific case is excluded from an otherwise
// fully deletable history. A superseded status entry, a 'clear' one, and
// every comment/image, stay freely deletable.
async function fetchHistoryHtml(filterColumn, filterValue) {
  const { data, error } = await sb.from('trail_history')
    .select('id, entry_type, value, created_at, location_id')
    .eq(filterColumn, filterValue)
    .order('created_at', { ascending: false });
  if (error) return '<div class="history-empty">Could not load history.</div>';
  if (!data.length) return '<div class="history-empty">No history yet.</div>';

  const seenPointStatus = new Set();
  const protectedIds = new Set();
  for (const row of data) {
    if (row.entry_type !== 'status') continue;
    const pointKey = row.location_id ?? '';
    if (seenPointStatus.has(pointKey)) continue;
    seenPointStatus.add(pointKey);
    if (row.value.status !== 'clear') protectedIds.add(row.id);
  }

  const items = await Promise.all(data.map(async row => {
    const when = new Date(row.created_at).toLocaleString();
    let body;
    if (row.entry_type === 'status') {
      body = `Status: <strong>${escapeHtml(row.value.status)}</strong>`;
    } else if (row.entry_type === 'comment') {
      body = escapeHtml(row.value.text);
    } else if (row.entry_type === 'image') {
      historyEntryData.set(row.id, { path: row.value.path, thumb_path: row.value.thumb_path || null });
      const { data: signed, error: signErr } =
        await sb.storage.from('trail-images').createSignedUrl(row.value.thumb_path || row.value.path, 300);
      body = signErr
        ? '<em>Could not load image</em>'
        : `<img src="${signed.signedUrl}" class="history-thumb" data-entry-id="${row.id}">`;
    } else {
      body = escapeHtml(JSON.stringify(row.value));
    }

    const isProtected = row.entry_type === 'status' && protectedIds.has(row.id);
    const deleteHtml = isProtected ? ''
      : `<button class="history-delete" data-entry-id="${row.id}" title="Delete this entry">✕</button>`;
    return `<li>${body}<br><small>${when}</small>${deleteHtml}</li>`;
  }));
  return `<ul class="history-list">${items.join('')}</ul>`;
}

const imageLightboxWrap = document.getElementById('image-lightbox-wrap');
const imageLightboxImg  = document.getElementById('image-lightbox-img');
imageLightboxWrap.addEventListener('click', () => {
  imageLightboxWrap.style.display = 'none';
  imageLightboxImg.src = '';
});

async function openImageLightbox(path) {
  const { data: signed, error } = await sb.storage.from('trail-images').createSignedUrl(path, 300);
  if (error) return;
  imageLightboxImg.src = signed.signedUrl;
  imageLightboxWrap.style.display = 'flex';
}

// Delegated (history list content is re-rendered wholesale on every refresh,
// so binding to individual elements would mean rebinding every time) click
// handling for both the thumbnail-opens-lightbox and delete-entry actions.
document.addEventListener('click', async e => {
  const thumb = e.target.closest('.history-thumb');
  if (thumb) {
    const entry = historyEntryData.get(thumb.dataset.entryId);
    if (entry) openImageLightbox(entry.path);
    return;
  }

  const delBtn = e.target.closest('.history-delete');
  if (!delBtn) return;
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  const entryId = delBtn.dataset.entryId;
  try {
    const { error } = await sb.from('trail_history').delete().eq('id', entryId);
    if (error) throw error;
  } catch (err) {
    alert(`Could not delete: ${err.message}`);
    return;
  }
  const imageData = historyEntryData.get(entryId);
  if (imageData) {
    const paths = [imageData.path, imageData.thumb_path].filter(Boolean);
    if (paths.length) {
      const { error: rmErr } = await sb.storage.from('trail-images').remove(paths);
      if (rmErr) console.error('Could not remove storage object(s) for deleted entry', rmErr);
    }
  }
  await refreshEntryFormHistory();
  refreshTrailData();
});

// Supabase only stores the OSM reference (osm_type/osm_id), not geometry, so
// the colored overlay has to be rebuilt from whatever's currently rendered —
// same technique as the selection highlight's multi-fragment matching above.
// No status history at all means no overlay line ("not updated") — but a
// trail whose worst/latest status *is* 'clear' still gets one (green), since
// a confirmed-clear report should read differently from never having been
// checked. (Future refinement: age out old reports — e.g. after a storm,
// only reports logged since the storm should count as "updated" and
// everything older should fall back to "not updated" — not built yet.)
function updateTrailStatusOverlay() {
  const src = map.getSource('trail-status');
  if (!src) return;
  if (!trailStatusMap.size) { src.setData({ type: 'FeatureCollection', features: [] }); return; }

  const layers = CLICKABLE_LINE_LAYERS.filter(id => map.getLayer(id));
  const rendered = map.queryRenderedFeatures(undefined, { layers });
  const features = [];
  for (const rf of rendered) {
    const identity = getTrailIdentity(rf.properties);
    if (!identity) continue;
    const key = `${identity.osm_type}:${identity.osm_id}`;
    const trailStatus = trailStatusMap.get(key);
    if (!trailStatus) continue;
    // identity_key lets trail-view-glow (index.html style layers) filter out
    // whichever trail is currently selected/pulsing, since that one owns its
    // own glow via trail-view-pulse-glow instead of the static one here.
    features.push({ type: 'Feature', geometry: rf.geometry, properties: { status: trailStatus, identity_key: key } });
  }
  src.setData({ type: 'FeatureCollection', features });
}

map.on('moveend', updateTrailStatusOverlay);
map.on('load', refreshTrailData);
map.on('sourcedata', e => {
  if (e.sourceId === 'osmvec' && e.isSourceLoaded) updateTrailStatusOverlay();
});

// Point-located history entries — click a marker to open the same unified
// view+add panel as a trail (see openEntryForm), scoped to this point's own
// history rather than the whole trail's (a marker is a place things happen
// to over time, e.g. "tree fell here" followed later by "cleared", not a
// single fixed state).
let historyPointPopup = null;
map.on('click', 'history-points', e => {
  const f = e.features[0];
  const props = f.properties;
  const [lng, lat] = f.geometry.coordinates;

  if (historyPointPopup) { historyPointPopup.remove(); historyPointPopup = null; }

  // RLS blocks anonymous reads entirely (mtb-editor/CLAUDE.md) — nothing
  // real to show, so just point at logging in rather than opening a panel
  // that can only ever say "no history".
  if (!currentSession) {
    historyPointPopup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: '220px' })
      .setLngLat([lng, lat])
      .setHTML('<div class="popup-trail-hint">Log in to view/add history</div>')
      .addTo(map);
    return;
  }

  // trailId/locationId already known (this marker's own values, trailId
  // possibly null for a point not linked to any trail) — skips
  // ensureTrailRow and find_or_create_location entirely, so this can never
  // end up creating a duplicate trail or snapping to a different nearby
  // location.
  openEntryForm({
    trailId: props.trail_id || null,
    locationId: props.location_id,
    label: 'This location',
    location: { lng, lat },
  });
});
map.on('mouseenter', 'history-points', () => { map.getCanvas().style.cursor = 'pointer'; });
map.on('mouseleave', 'history-points', () => { map.getCanvas().style.cursor = ''; });

// ---------------------------------------------------------------------------
// Background selector
// ---------------------------------------------------------------------------
const BG_LAYERS = { osm: 'bg-osm', satellite: 'bg-satellite' };
const CHANNEL_BG_LAYERS = {
  slope: 'slope-overlay',
  wetness: 'wetness-overlay',
  vegetation: 'vegheight-overlay',
};

function applyBackground(chosen) {
  Object.entries(BG_LAYERS).forEach(([key, id]) =>
    map.setLayoutProperty(id, 'visibility', key === chosen ? 'visible' : 'none'));
  Object.entries(CHANNEL_BG_LAYERS).forEach(([key, id]) =>
    map.setLayoutProperty(id, 'visibility', key === chosen ? 'visible' : 'none'));
}

document.getElementById('bg-select').addEventListener('change', e => {
  applyBackground(e.target.value);
  saveSetting('background', e.target.value);
});

// ---------------------------------------------------------------------------
// OSM vector toggles — lines/points (trails, roads, waterways, buildings,
// peaks, labels) vs. areas (forest/landuse/water fills, which visually fight
// the LiDAR-based hillshade and are the ones worth turning off)
// ---------------------------------------------------------------------------
const OSM_LINE_LAYERS = [
  'osm-road-casing','osm-road-fill','osm-track','osm-path',
  'osm-waterway','osm-railway','osm-power','osm-natural-lines',
  'osm-buildings','osm-peaks-tri','osm-peaks-label','osm-places',
];
const OSM_AREA_LAYERS = [
  'osm-landuse','osm-water',
];

function applyOsmVisibility(layers, visible) {
  const vis = visible ? 'visible' : 'none';
  // The peak layers (osm-peaks-tri/label) are added later, in map.on('load')
  // (see comment there) — style.load's first pass runs before they exist.
  // MapLibre fires a genuine 'error' event for styling a missing layer rather
  // than throwing synchronously, so try/catch alone doesn't suppress the
  // console noise — skip missing layers outright instead.
  layers.forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis); });
}

toggleOsmLines.addEventListener('change', e => {
  applyOsmVisibility(OSM_LINE_LAYERS, e.target.checked);
  saveSetting('osmLines', e.target.checked);
});

toggleOsmAreas.addEventListener('change', e => {
  applyOsmVisibility(OSM_AREA_LAYERS, e.target.checked);
  saveSetting('osmAreas', e.target.checked);
});

// ---------------------------------------------------------------------------
// Peak layers — added after load so we can register a canvas triangle image
// (Open Sans Bold lacks the ▲ glyph; icon-image is more reliable)
// ---------------------------------------------------------------------------
map.on('load', () => {
  // Draw a triangle (colored per VIEWER_STYLE.osm.peak) into a raw pixel buffer
  const sz = 22;
  const [peakR, peakG, peakB] = hexToRgb(VIEWER_STYLE.osm.peak.color);
  const data = new Uint8ClampedArray(sz * sz * 4);
  for (let y = 2; y < sz - 1; y++) {
    const t = (y - 2) / (sz - 4);          // 0 = apex, 1 = base
    const hw = t * (sz / 2 - 1.5);
    const cx = sz / 2;
    for (let x = Math.ceil(cx - hw); x <= Math.floor(cx + hw); x++) {
      const i = (y * sz + x) * 4;
      data[i]   = peakR;
      data[i+1] = peakG;
      data[i+2] = peakB;
      data[i+3] = 230;   // A
    }
  }
  map.addImage('peak-tri', { width: sz, height: sz, data });

  // Triangle icon — visible from Z7, higher peaks win collisions
  map.addLayer({
    id: 'osm-peaks-tri',
    type: 'symbol',
    source: 'osmvec',
    'source-layer': 'peaks',
    minzoom: 7,
    layout: {
      'icon-image': 'peak-tri',
      'icon-size': ['interpolate', ['linear'], ['zoom'], 7, 0.55, 10, 0.75, 14, 1.0],
      'icon-allow-overlap': false,
      'symbol-sort-key': ['*', ['to-number', ['get', 'ele'], 0], -1],
    },
  });

  // Name + elevation label — appears from Z12, below the icon
  map.addLayer({
    id: 'osm-peaks-label',
    type: 'symbol',
    source: 'osmvec',
    'source-layer': 'peaks',
    minzoom: 12,
    layout: {
      'text-field': ['format',
        ['coalesce', ['get', 'name'], ''], {'font-scale': 1.0},
        ['case',
          ['all', ['has', 'ele'],
                  ['!=', ['get', 'ele'], null],
                  ['!=', ['get', 'ele'], '']],
          ['concat', '\n',
            ['to-string', ['round', ['to-number', ['get', 'ele'], 0]]],
            ' m'],
          '',
        ], {'font-scale': 0.85},
      ],
      'text-font': ['Open Sans Bold'],
      'text-size': 11,
      'text-anchor': 'top',
      'text-offset': [0, 0.9],
      'symbol-sort-key': ['*', ['to-number', ['get', 'ele'], 0], -1],
    },
    paint: {
      'text-color': VIEWER_STYLE.osm.peak.color,
      'text-halo-color': 'rgba(0,0,0,0.8)',
      'text-halo-width': 1.5,
    },
  });

  // The peak layers just added didn't exist yet at 'style.load', so they
  // missed that visibility pass — apply it once more now that they're here.
  applyOsmVisibility(OSM_LINE_LAYERS, loadSetting('osmLines'));

  if (loadSetting('terrain3d')) {
    map.setTerrain({ source: 'terrain', exaggeration: parseInt(vertSlider.value) / 10 });
    map.setPitch(50);
  }
});

// Initial compass draw
drawCompass(315);

// ---------------------------------------------------------------------------
// Place search — Nominatim, biased toward Dalarna
// ---------------------------------------------------------------------------
const searchInput   = document.getElementById('search-input');
const searchClear   = document.getElementById('search-clear');
const searchResults = document.getElementById('search-results');
const searchStatus  = document.getElementById('search-status');

let searchMarker = null;
let searchTimer  = null;
let activeIdx    = -1;

function showResults(items) {
  searchStatus.style.display = 'none';
  searchResults.innerHTML = '';
  searchResults.style.display = items.length ? 'block' : 'none';
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'search-item';
    const name = item.display_name.split(',').slice(0, 2).join(',');
    const sub  = item.display_name.split(',').slice(2, 4).join(',').trim();
    el.innerHTML = `${name}<small>${sub}</small>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); selectResult(item); });
    searchResults.appendChild(el);
  });
  activeIdx = -1;
}

function setStatus(msg) {
  searchResults.innerHTML = '';
  searchResults.appendChild(searchStatus);
  searchStatus.style.display = 'block';
  searchStatus.textContent = msg;
  searchResults.style.display = 'block';
}

function selectResult(item) {
  const lng = parseFloat(item.lon);
  const lat = parseFloat(item.lat);
  const bb  = item.boundingbox;           // [minlat, maxlat, minlon, maxlon]

  searchInput.value = item.display_name.split(',').slice(0, 2).join(',').trim();
  searchClear.style.display = 'block';
  closeDropdown();

  if (searchMarker) searchMarker.remove();
  searchMarker = new maplibregl.Marker({ color: '#5ba4cf' })
    .setLngLat([lng, lat])
    .addTo(map);

  if (bb) {
    map.fitBounds(
      [[parseFloat(bb[2]), parseFloat(bb[0])], [parseFloat(bb[3]), parseFloat(bb[1])]],
      { padding: 80, maxZoom: 15, duration: 800 }
    );
  } else {
    map.flyTo({ center: [lng, lat], zoom: 13, duration: 800 });
  }
}

function closeDropdown() {
  searchResults.style.display = 'none';
  activeIdx = -1;
}

async function doSearch(q) {
  if (q.length < 2) { closeDropdown(); return; }
  setStatus('Searching…');
  try {
    const params = new URLSearchParams({
      q, format: 'json', limit: 7,
      countrycodes: 'se',
      viewbox: '13.0,59.5,16.5,62.5',   // Dalarna bias
      bounded: '0',
    });
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?${params}`,
                             { headers: { 'Accept-Language': 'sv,en' } });
    const data = await res.json();
    if (data.length) showResults(data);
    else setStatus('No results');
  } catch(_) {
    setStatus('Search unavailable');
  }
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { closeDropdown(); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchResults.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    closeDropdown();
    searchInput.blur();
    return;
  }
  items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeDropdown();
  if (searchMarker) { searchMarker.remove(); searchMarker = null; }
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown();
});
</script>
</body>
